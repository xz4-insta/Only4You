<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Miss You ☁️💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body, .main-wrapper {
  margin: 0;
  overflow: hidden;
  min-height: 100vh;
  display: flex !important;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #e0f7fa, #ffffff, #b3e5fc) !important;
  background-size: 400% 400%;
  animation: skyMove 15s ease infinite;
  font-family: 'Poppins', sans-serif;
  color: #333;
}

@keyframes skyMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating Clouds */
.cloud {
  position: fixed;
  opacity: 0.6;
  pointer-events: none;
  animation: cloudFloat linear infinite;
  z-index: 1;
}

@keyframes cloudFloat {
  from { transform: translateX(-200px); }
  to { transform: translateX(calc(100vw + 200px)); }
}

/* ===== STAGE BASE ===== */
.stage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.stage.active {
  display: flex;
}

/* Card */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(25px);
  border-radius: 40px;
  padding: 50px 30px;
  width: 450px;
  max-width: 90%;
  text-align: center;
  color: #2c3e50;
  position: relative;
  box-shadow: 0 15px 35px rgba(179,229,252,0.5), 0 5px 15px rgba(0,0,0,0.05);
  animation: fadeIn 1.2s ease forwards;
  transform-style: preserve-3d;
  border: 1px solid rgba(255,255,255,0.4);
  z-index: 10;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

h2, h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 48px;
  margin-top: 0;
  margin-bottom: 10px;
  color: #0288d1;
}

/* ===== ENGINE COMPATIBLE OPENER (PAPER PLANE) ===== */
.envelope {
  width: 200px;
  height: 150px;
  margin: 20px auto;
  cursor: pointer;
  position: relative;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: block;
}

.plane-svg {
  width: 120px;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
  animation: planeWobble 3s ease-in-out infinite;
  transition: opacity 0.4s ease;
}

/* Hide plane and reveal text when engine adds .envelope-opened */
.envelope.envelope-opened .plane-svg {
  opacity: 0;
  pointer-events: none;
}

.flap {
  display: none; /* satisfy engine's requirement */
}

@keyframes planeWobble {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(5deg); }
}

#letterContent {
  display: none;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  font-family: 'Dancing Script', cursive;
  font-size: 24px;
  color: #333;
  line-height: 1.4;
  position: relative;
  bottom: -20px; /* Engine will animate this to bottom: 0 */
  opacity: 0;
  transition: opacity 0.5s ease;
}

.envelope.envelope-opened #letterContent {
  display: block !important;
  opacity: 1 !important;
}

/* ===== ENGINE COMPATIBLE LOVE METER ===== */
.meter-tag {
  display: inline-block;
  background: rgba(2,136,209,0.1);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  margin: 10px 0;
  color: #0288d1;
}

.meter-bar {
  width: 300px;
  height: 18px;
  background: rgba(0,0,0,0.05);
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
}

#loveFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #26c6da, #0288d1);
  border-radius: 20px;
  transition: width .4s ease;
}

/* Bubbles logic (CSS purely) */
#loveBtn:active::after {
  content: '🫂';
  position: absolute;
  top: -40px;
  left: 50%;
  animation: floatUp 1s forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translate(-50%, 0); opacity: 1; }
  100% { transform: translate(-50%, -100px) scale(2); opacity: 0; }
}

/* Memories */
#tvScreen {
  background: white !important;
  border: 8px solid white;
  box-shadow: 0 15px 45px rgba(179,229,252,0.4) !important;
}

/* Dots */
.dot.active {
  background: #0288d1 !important;
  box-shadow: 0 0 15px rgba(2,136,209,0.6) !important;
}

button {
  padding: 14px 35px;
  border: none;
  border-radius: 35px;
  margin-top: 20px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #0288d1, #26c6da);
  color: white;
  font-family: 'Poppins', sans-serif;
}
</style>
</head>

<body>

<!-- STAGE 1: OPENER -->
<div class="stage active" id="stage1">
  <div class="card">
    <h2>A message for you... ☁️</h2>
    
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div> <!-- Required by Engine -->
      <svg class="plane-svg" viewBox="0 0 512 512" fill="#0288d1">
        <path d="M512 64L0 256l192 64 64 192L512 64z"/>
        <path d="M192 320l256-192-256 128V320z" fill="#01579b"/>
      </svg>
      <div id="letterContent">
        <!-- Text typed by Engine -->
      </div>
      <div class="plane-label" style="font-size:12px; margin-top:10px; font-weight:700; color:#0288d1; opacity:0.7">TAP TO UNFOLD ✈️</div>
    </div>

    <button onclick="nextStage()" style="display:none">Start Journey ➡</button>
  </div>
</div>

<!-- STAGE 2: METER -->
<div class="stage" id="stage2">
  <div class="card">
    <h2>Missing You... 💙</h2>
    <div class="meter-tag" id="loveLevelTag">WARMING UP 🌬️</div>
    <div class="meter-bar">
      <div id="loveFill"></div>
    </div>
    <div id="loveBig" style="font-size:60px; font-weight:700; color:#0288d1;">0%</div>
    
    <button id="loveBtn" onclick="increaseLove()">🫂 Send Hugs</button>
    <button onclick="nextStage()" style="display:none">Continue ➡</button>
  </div>
</div>

<!-- STAGE 3: MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    <h2>Sweet Memories ☁️</h2>
    <div id="tvScreen" style="width:100%; height:320px; overflow:hidden; border-radius:20px; margin-top:20px;"></div>
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
      <button onclick="prevMemory()" style="background:#e1f5fe; color:#0288d1;">⬅</button>
      <button onclick="nextMemory()" style="background:#e1f5fe; color:#0288d1;">➡</button>
    </div>
    <button onclick="nextStage()" style="width:100%;">Continue 💙</button>
  </div>
</div>

<!-- STAGE 4: REACTION TARGET -->
<div class="stage" id="stage4">
  <div class="card">
    <h2>Hear My Heart 🎧</h2>
    <div id="voiceContainer"></div>
    
    <!-- Reaction Button Target (moved from Stage 1) -->
    <div id="reactionTarget" style="margin-top: 30px;"></div>

    <button onclick="nextStage()" style="width:100%; margin-top:20px;">Continue 💙</button>
  </div>
</div>

<!-- STAGE 5: QUIZ -->
<div class="stage" id="stage5">
  <div class="card">
    <h2>Our Story ☁️</h2>
    <div id="quizContainer"></div>
    <button onclick="nextStage()" style="width:100%;">Almost there 💍</button>
  </div>
</div>

<!-- STAGE 6: FINAL -->
<div class="stage" id="stage6">
  <div class="card">
    <h2 id="finalQuestion" style="font-size:40px;"></h2>
    <div style="font-size:80px; margin:20px 0;">✈️</div>
    <div style="display:flex; gap:15px; justify-content:center;">
      <button onclick="celebrate()">YES 💙</button>
      <button>NO 😅</button>
    </div>
  </div>
</div>

<div id="progressDots"></div>

</body>
</html>
