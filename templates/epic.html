<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Love Story 💍</title>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="../js/optimization.js" type="module"></script>

<style>

:root {
  --glow-primary: #6A0DAD;    /* Royal Purple */
  --glow-secondary: #9575CD;  /* Soft Violet */
  --v-color: 106, 13, 173;    /* Purple RGB */
  --bg-dark: #0b0a0f;
  --bg-accent: #2e0f3a;
  --text-main: #fdf5e6;
  --gold: #D4AF37;
}

body{
  margin:0;
  overflow:hidden;
  font-family:'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-accent));
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  color: var(--text-main);
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== STAGE BASE ===== */

.stage{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  z-index:1000;
  padding: 60px 20px;
  box-sizing: border-box;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: transparent; /* Inherits from body */
}

.stage.active{
  display:flex;
}

.card{
  background: rgba(20, 10, 30, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 32px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 20px rgba(var(--v-color), 0.3);
  max-width: 420px;
  width: 100%;
  text-align: center;
  animation: fadeUp .8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  position: relative;
  margin: auto 0;
  flex-shrink: 0;
}

@keyframes fadeUp{
  from{transform:translateY(40px); opacity:0;}
  to{transform:translateY(0); opacity:1;}
}

/* ===== TYPOGRAPHY ===== */
h2 {
  font-size: 2rem;
  margin-bottom: 5px;
  color: var(--text-main);
  font-weight: 300;
  letter-spacing: 1px;
}
h2 b {
  color: var(--gold);
  font-weight: 700;
}
p {
  color: var(--text-main);
  opacity: 0.8;
  font-size: 14px;
}

/* ===== BUTTONS ===== */
button {
  padding: 14px 35px;
  border: none;
  border-radius: 40px;
  margin-top: 25px;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  cursor: pointer;
  background: linear-gradient(90deg, var(--glow-primary), var(--glow-secondary));
  color: white;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(var(--v-color), 0.4);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

button:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px rgba(var(--v-color), 0.6);
}

/* ===== ENVELOPE ===== */
.envelope {
  width: 240px;
  height: 160px;
  background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary));
  margin: 40px auto;
  position: relative;
  border-radius: 15px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 20px rgba(var(--v-color), 0.3);
  cursor: pointer;
  perspective: 1000px;
  transition: transform 0.4s ease;
}

.envelope:hover {
  transform: translateY(-5px) rotateX(5deg);
}

.flap {
  position: absolute;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--glow-secondary), var(--glow-primary));
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: 0.8s ease;
  transform-origin: top;
  z-index: 2;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
}

.letter {
  position: absolute;
  bottom: 0;
  left: 5%;
  background: #f8f8f8;
  width: 90%;
  height: 80%;
  padding: 20px;
  box-sizing: border-box;
  transition: 0.8s ease;
  font-size: 15px;
  line-height: 1.5;
  border-radius: 10px;
  color: #333;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
}

/* ===== LOVE METER ===== */
.loveLevelTag {
  display: inline-block;
  background: rgba(var(--v-color), 0.2);
  border: 1px solid var(--glow-primary);
  color: var(--gold);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 15px 0;
  font-weight: 700;
}

.loveBar {
  width: 100%;
  height: 14px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

#loveFill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--glow-primary), var(--glow-secondary));
  border-radius: 20px;
  transition: width 0.4s ease;
  box-shadow: 0 0 15px var(--glow-primary);
}

.loveBig {
  font-size: 72px;
  font-weight: 900;
  margin: 10px 0;
  color: #fff;
  text-shadow: 0 0 20px rgba(var(--v-color), 0.8), 0 0 40px rgba(var(--v-color), 0.4);
}

.loveSub {
  opacity: 0.6;
  font-size: 14px;
}

/* ===== PROGRESS DOTS ===== */
.progress-dots {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 2000;
}

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  transition: 0.4s ease;
}

.dot.active {
  background: var(--glow-primary);
  transform: scale(1.4);
  box-shadow: 0 0 10px var(--glow-primary);
}

/* ===== FINAL STAGE YES/NO ===== */
.yes {
  background: var(--gold);
  color: #000;
  animation: goldPulse 2s infinite;
}

@keyframes goldPulse {
  0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
  50% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.8); }
  100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
}

.no {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
}

.ring {
  font-size: 80px;
  margin: 20px 0;
  filter: drop-shadow(0 0 20px var(--gold));
}

/* Floating Hearts */
.floatHeart {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 24px;
  animation: premiumFloat 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes premiumFloat {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  20% { opacity: 1; transform: translateY(-30px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
}

</style>
</head>

<body>

<!-- STAGE 1 -->
<div class="stage active" id="stage1">
  <div class="card">
    <h2>Our <b>Epic Story</b> 💍</h2>
    <p>A journey created specifically for us</p>
    
    <div class="envelope" onclick="openLetter()">

      <div class="flap"></div>
      <div class="letter" id="letterContent">{{message}}</div>
    </div>
    
    <button onclick="nextStage()">Begin Adventure</button>
  </div>
</div>

<!-- STAGE 2 -->
<div class="stage" id="stage2">
  <div class="card">
    <h2>Do You <b>Love Me?</b> 💜</h2>
    <p>Tap repeatedly to manifest our energy</p>
    
    <div class="loveLevelTag" id="loveLevelTag">Aura Warming Up...</div>

    
    <div class="loveBar">
      <div id="loveFill"></div>
    </div>
    
    <div class="loveBig" id="loveBig">0%</div>
    <p class="loveSub" id="loveSub">Channeling the cosmos...</p>
    
    <button class="loveBtn" onclick="increaseLove()">✨ Infuse Love</button>

    <button id="continueBtn" onclick="nextStage()" style="display:none">Continue →</button>
  </div>
</div>

<!-- STAGE 3 MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    <h2>Our <b>Epic Memories</b> 📸</h2>
    
    <div id="tvScreen" style="width:100%; height:260px; overflow:hidden; border-radius:15px; background:rgba(0,0,0,0.5); margin-top:20px; border:1px solid rgba(255,255,255,.1);"></div>
    
    <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
      <button onclick="prevMemory()" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);">⬅</button>
      <button onclick="nextMemory()" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);">➡</button>
    </div>
    
    <button onclick="nextStage()" style="width:100%; margin-top:15px;">Continue</button>
  </div>
</div>

<!-- STAGE 4 VOICES -->
<div class="stage" id="stage4">
  <div class="card">
    <h2>Hear My <b>Heart</b> 🎧</h2>
    <p>Whispers of our journey</p>
    <div id="voiceContainer" class="voice-container"></div>
    <div id="reactionTarget" style="margin:20px 0;"></div>
    <button onclick="nextStage()" style="width:100%;">Continue</button>
  </div>
</div>

<!-- STAGE 5 QUIZ -->
<div class="stage" id="stage5">
  <div class="card">
    <h2>The <b>Epic Quiz</b> 📝</h2>
    <p>Testing our cosmic alignment</p>
    <div id="quizContainer"></div>
    <button onclick="nextStage()" style="margin-top:20px;">The Final reveal ➡</button>
  </div>
</div>

<!-- STAGE 6 FINAL -->
<div class="stage" id="stage6">
  <div class="card">
    <h2 id="finalQuestion"></h2>
    <div class="ring" id="ring">💍</div>
    
    <div style="display:flex; gap:20px; justify-content:center; margin-top:30px;">
      <button class="yes" id="yesBtn" onclick="celebrate()">YES 💖</button>
      <button class="no" id="noBtn">NO 😅</button>
    </div>
  </div>
</div>

<div class="progress-dots" id="progressDots"></div>

<script type="module">
  import { initEpicInteractions } from "../js/stageEngine.js";

  document.addEventListener("DOMContentLoaded",()=>{
    if (window.location.pathname.includes("success.html")) return;
    const saved = JSON.parse(localStorage.getItem("only4you_story")) || {};

    initEpicInteractions({
      message: saved.message || "You are my greatest adventure... 📖❤️",
      images: saved.images || [],
      voices: saved.voices || [],
      quiz: saved.quiz || [],
      bgMusic: saved.bgMusic,
      plan: saved.plan,
      finalQuestion: saved.finalQuestion || "Will you be my forever? 💍"
    });
  });
</script>
</body>
</html>
